version: "3.9"

services:
  platform-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${PLATFORM_DB_NAME}
      POSTGRES_USER: ${PLATFORM_DB_USER}
      POSTGRES_PASSWORD: ${PLATFORM_DB_PASSWORD}
    volumes:
      - platform_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLATFORM_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  warehouse-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${WAREHOUSE_DB_NAME}
      POSTGRES_USER: ${WAREHOUSE_DB_USER}
      POSTGRES_PASSWORD: ${WAREHOUSE_DB_PASSWORD}
    volumes:
      - warehouse_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dagster:
    build: ./dagster
    environment:
      - PLATFORM_DB_HOST=platform-db
      - WAREHOUSE_DB_HOST=warehouse-db
      - WAREHOUSE_DB_PORT=5432
      - PLATFORM_DB_NAME=${PLATFORM_DB_NAME}
      - PLATFORM_DB_USER=${PLATFORM_DB_USER}
      - PLATFORM_DB_PASSWORD=${PLATFORM_DB_PASSWORD}
      - WAREHOUSE_DB_NAME=${WAREHOUSE_DB_NAME}
      - WAREHOUSE_DB_USER=${WAREHOUSE_DB_USER}
      - WAREHOUSE_DB_PASSWORD=${WAREHOUSE_DB_PASSWORD}
      # mock-datasources runs as a separate container; expose it on host port 8001
      # and reference it here via host.docker.internal or a shared network
      - API_BASE_URL=http://host.docker.internal:8001
    ports:
      - "3000:3000"
    depends_on:
      platform-db:
        condition: service_healthy
      warehouse-db:
        condition: service_healthy

  backend:
    build: ./backend
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - PLATFORM_DB_HOST=platform-db
      - WAREHOUSE_DB_HOST=warehouse-db
      - PLATFORM_DB_NAME=${PLATFORM_DB_NAME}
      - PLATFORM_DB_USER=${PLATFORM_DB_USER}
      - PLATFORM_DB_PASSWORD=${PLATFORM_DB_PASSWORD}
      - WAREHOUSE_DB_NAME=${WAREHOUSE_DB_NAME}
      - WAREHOUSE_DB_USER=${WAREHOUSE_DB_USER}
      - WAREHOUSE_DB_PASSWORD=${WAREHOUSE_DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      platform-db:
        condition: service_healthy
      warehouse-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: ./backend
    command: celery -A config worker -l info
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - PLATFORM_DB_HOST=platform-db
      - WAREHOUSE_DB_HOST=warehouse-db
      - PLATFORM_DB_NAME=${PLATFORM_DB_NAME}
      - PLATFORM_DB_USER=${PLATFORM_DB_USER}
      - PLATFORM_DB_PASSWORD=${PLATFORM_DB_PASSWORD}
      - WAREHOUSE_DB_NAME=${WAREHOUSE_DB_NAME}
      - WAREHOUSE_DB_USER=${WAREHOUSE_DB_USER}
      - WAREHOUSE_DB_PASSWORD=${WAREHOUSE_DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  platform_db_data:
  warehouse_db_data:
