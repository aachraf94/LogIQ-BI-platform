services:
  platform-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${PLATFORM_DB_NAME}
      POSTGRES_USER: ${PLATFORM_DB_USER}
      POSTGRES_PASSWORD: ${PLATFORM_DB_PASSWORD}
    volumes:
      - platform_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLATFORM_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  warehouse-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${WAREHOUSE_DB_NAME}
      POSTGRES_USER: ${WAREHOUSE_DB_USER}
      POSTGRES_PASSWORD: ${WAREHOUSE_DB_PASSWORD}
    volumes:
      - warehouse_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - PLATFORM_DB_HOST=platform-db
      - PLATFORM_DB_PORT=5432
      - WAREHOUSE_DB_HOST=warehouse-db
      - WAREHOUSE_DB_PORT=5432
      - PLATFORM_DB_NAME=${PLATFORM_DB_NAME}
      - PLATFORM_DB_USER=${PLATFORM_DB_USER}
      - PLATFORM_DB_PASSWORD=${PLATFORM_DB_PASSWORD}
      - WAREHOUSE_DB_NAME=${WAREHOUSE_DB_NAME}
      - WAREHOUSE_DB_USER=${WAREHOUSE_DB_USER}
      - WAREHOUSE_DB_PASSWORD=${WAREHOUSE_DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - API_BASE_URL=http://mock-datasources:8000
      - HRFORCE_API_TOKEN=${HRFORCE_API_TOKEN}
      - DAGSTER_WEBHOOK_TOKEN=${DAGSTER_WEBHOOK_TOKEN}
      - SUPERADMIN_USERNAME=${SUPERADMIN_USERNAME}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-LOGIQ Platform <noreply@logiq.space>}
    ports:
      - "8000:8000"
    depends_on:
      platform-db:
        condition: service_healthy
      warehouse-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Single worker + beat scheduler (suitable for single-VPS deployment).
  # For multi-worker setups, run beat as a separate service.
  celery:
    build: ./backend
    command: celery -A config worker --beat -l info
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - PLATFORM_DB_HOST=platform-db
      - PLATFORM_DB_PORT=5432
      - WAREHOUSE_DB_HOST=warehouse-db
      - WAREHOUSE_DB_PORT=5432
      - PLATFORM_DB_NAME=${PLATFORM_DB_NAME}
      - PLATFORM_DB_USER=${PLATFORM_DB_USER}
      - PLATFORM_DB_PASSWORD=${PLATFORM_DB_PASSWORD}
      - WAREHOUSE_DB_NAME=${WAREHOUSE_DB_NAME}
      - WAREHOUSE_DB_USER=${WAREHOUSE_DB_USER}
      - WAREHOUSE_DB_PASSWORD=${WAREHOUSE_DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - API_BASE_URL=http://mock-datasources:8000
      - HRFORCE_API_TOKEN=${HRFORCE_API_TOKEN}
      - DAGSTER_WEBHOOK_TOKEN=${DAGSTER_WEBHOOK_TOKEN}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-LOGIQ Platform <noreply@logiq.space>}
    depends_on:
      platform-db:
        condition: service_healthy
      warehouse-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  dagster:
    build: ./dagster
    environment:
      - DAGSTER_HOME=/app/dagster_home
      - PLATFORM_DB_HOST=platform-db
      - PLATFORM_DB_PORT=5432
      - WAREHOUSE_DB_HOST=warehouse-db
      - WAREHOUSE_DB_PORT=5432
      - PLATFORM_DB_NAME=${PLATFORM_DB_NAME}
      - PLATFORM_DB_USER=${PLATFORM_DB_USER}
      - PLATFORM_DB_PASSWORD=${PLATFORM_DB_PASSWORD}
      - WAREHOUSE_DB_NAME=${WAREHOUSE_DB_NAME}
      - WAREHOUSE_DB_USER=${WAREHOUSE_DB_USER}
      - WAREHOUSE_DB_PASSWORD=${WAREHOUSE_DB_PASSWORD}
      # Both Dagster and Backend reach mock-datasources via the shared Docker network.
      - API_BASE_URL=http://mock-datasources:8000
      - BACKEND_URL=http://backend:8000
      - YALIDINE_API_ID=${YALIDINE_API_ID}
      - YALIDINE_API_TOKEN=${YALIDINE_API_TOKEN}
      - HRFORCE_API_TOKEN=${HRFORCE_API_TOKEN}
      - CASHBOX_API_TOKEN=${CASHBOX_API_TOKEN}
      - PAIE_API_TOKEN=${PAIE_API_TOKEN}
      - TRANSPORT_API_TOKEN=${TRANSPORT_API_TOKEN}
      - DAGSTER_WEBHOOK_TOKEN=${DAGSTER_WEBHOOK_TOKEN}
    volumes:
      # Persist Dagster run history and schedule state across image rebuilds.
      # dagster.yaml stays in the image so config changes apply on next build.
      - dagster_storage:/app/dagster_home/storage
      - dagster_schedules:/app/dagster_home/schedules
    ports:
      - "3000:3000"
    depends_on:
      platform-db:
        condition: service_healthy
      warehouse-db:
        condition: service_healthy
      backend:
        condition: service_started

  # NEXT_PUBLIC_API_URL is baked into the JS bundle at build time by Next.js.
  # Changing it requires rebuilding the image: docker compose up --build -d frontend
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  platform_db_data:
  warehouse_db_data:
  dagster_storage:
  dagster_schedules:

networks:
  default:
    name: logiq-net
    external: true
